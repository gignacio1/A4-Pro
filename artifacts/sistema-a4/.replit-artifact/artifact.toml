kind = "web"
previewPath = "/"
title = "Sistema A4 PRO"
version = "1.0.0"
id = "artifacts/sistema-a4"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23508

[services.development]
run = "npm run dev -w @workspace/sistema-a4"

[services.production]
build = [ "npm", "run", "build", "-w", "@workspace/sistema-a4" ]
serve = "static"
publicDir = "artifacts/sistema-a4/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23508"
BASE_PATH = "/"
